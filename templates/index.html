<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(99,102,241,0.2);
            box-shadow: 0 0 40px rgba(99,102,241,0.2);
            overflow: hidden;
        }
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(99,102,241,0.2);
            background: #16162a;
        }
        .header .icon { font-size: 36px; }
        .header h1 { color: #fff; font-size: 20px; margin: 8px 0 4px; }
        .header p { color: #888; font-size: 13px; }
        .badge {
            display: inline-block;
            background: rgba(99,102,241,0.15);
            color: #818cf8;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 6px;
            border: 1px solid rgba(99,102,241,0.3);
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .user-message {
            background: #6366f1;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #0f0f1a;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        .typing {
            background: #0f0f1a;
            border: 1px solid rgba(99,102,241,0.2);
            align-self: flex-start;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 12px 16px;
        }
        .dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #6366f1;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 20px;
            border-top: 1px solid rgba(99,102,241,0.1);
        }
        .suggestion {
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.2);
            color: #818cf8;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            border-top: 1px solid rgba(99,102,241,0.2);
            background: #16162a;
        }
        input {
            flex: 1;
            background: #0f0f1a;
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        input::placeholder { color: #555; }
        button {
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .welcome {
            text-align: center;
            color: #555;
            font-size: 13px;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📄</div>
            <h1>PDF Assistant</h1>
            <p>Ask anything from the documents</p>
            <span class="badge">⚡ Powered by RAG</span>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome">
                👋 Hello! Ask me anything about the documents.
            </div>
        </div>

        <div class="suggestions">
            <span class="suggestion" onclick="fillQuestion(this)">Consultation fee?</span>
            <span class="suggestion" onclick="fillQuestion(this)">Opening hours?</span>
            <span class="suggestion" onclick="fillQuestion(this)">Premium package price?</span>
            <span class="suggestion" onclick="fillQuestion(this)">How to pay?</span>
        </div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Ask a question..." />
            <button onclick="askQuestion()">Send</button>
        </div>
    </div>

    <script>
        const sessionId = Math.random().toString(36).substring(7);

        function fillQuestion(el) {
            document.getElementById('question').value = el.textContent;
            askQuestion();
        }

        function addMessage(text, isUser) {
            const chatArea = document.getElementById('chatArea');
            const welcome = chatArea.querySelector('.welcome');
            if (welcome) welcome.remove();
            const div = document.createElement('div');
            div.className = isUser ? 'message user-message' : 'message bot-message';
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function askQuestion() {
            const input = document.getElementById('question');
            const question = input.value.trim();
            if (!question) return;
            input.value = '';
            addMessage(question, true);
            showTyping();
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: question,
                    session_id: sessionId
                })
            });
            const data = await response.json();
            removeTyping();
            addMessage(data.answer, false);
        }

        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') askQuestion();
        });
    </script>
</body>
</html>
